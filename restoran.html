<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restoran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url(https://images5.alphacoders.com/876/876612.jpg);
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 40px;
        }

        /* Navbar Layout */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .logo {
            color: #fcb62a; 
            font-family: Cambria, Georgia, serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 30px;
            list-style: none;
        }

        .nav-link a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 14px;
            transition: 0.3s;
        }

        .nav-link a:hover {
            color: #fcb62a;
        }

        .btn {
            text-decoration: none;
            background: #fcb62a;
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e09e1b;
        }

        /* Hero Content Layout  */
        .hero-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            min-height: 75vh;
            padding: 0 40px;
        }

        /* left text*/
        .hero-left {
            flex: 1;
            max-width: 50%;
            color: white;
        }

        .hero-left h1 {
            font-size: 55px;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-left p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ddd;
        }

        .bt2 {
            text-decoration: none;
            background: #fcb62a;
            color: white;
            border: none;
            padding: 15px 35px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .bt2:hover {
            background: #e09e1b;
        }

        /* right plate img */
        .hero-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rotating-plate {
            max-width: 85%;
            height: auto;
            /* plate rotating animation */
            animation: spin 30s linear infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        /* rotating Keyframes */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 992px) {
            .hero-section {
                flex-direction: column;
                text-align: center;
            }
            .hero-left {
                max-width: 100%;
                margin-bottom: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <h2 class="logo"><i class="fa-solid fa-utensils"></i> Restoran</h2>
            <div class="nav-link">
                <a href="#">HOME</a>
                <a href="#">ABOUT</a>
                <a href="#">SERVICE</a>
                <a href="#">MENU</a>
                <a href="#">PAGES</a>
                <a href="#">CONTACT</a>
                <button class="btn">BOOK A TABLE</button>
            </div>
        </nav>

        <div class="hero-section">
            <div class="hero-left">
                <h1>Enjoy Our <br>Delicious Meal</h1>
                <p>
                    Lorem ipsum, dolor sit amet consectetur adipisicing elit. <br>
                    Fuga nesciunt consequuntur iusto excepturi, quidem possimus? <br>
                    Reprehenderit, sequi animi minima unde recusandae ipsa officiis.
                </p>
                <button class="bt2">BOOK A TABLE</button> 
            </div>
            
            <div class="hero-right">
                <img src="https://themewagon.github.io/restoran/img/hero.png" alt="Delicious Meal" class="rotating-plate">
            </div>
        </div>
    </div>

</body>
</html>
